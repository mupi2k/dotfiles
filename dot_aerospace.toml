config-version = 2

after-startup-command = []

start-at-login = true

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

accordion-padding = 5

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

on-mode-changed = []

# Workspaces are pinned to monitors when the Dells are connected; fall back to
# 'main' (built-in) automatically when they're not.
[workspace-to-monitor-force-assignment]
# DELL U2719D (2) — primary (dev, browser, terminal)
1 = ['DELL U2719D \(2\)', 'main']
5 = ['DELL U2719D \(2\)', 'main']
A = ['DELL U2719D \(2\)', 'main']
B = ['DELL U2719D \(2\)', 'main']
C = ['DELL U2719D \(2\)', 'main']
D = ['DELL U2719D \(2\)', 'main']
E = ['DELL U2719D \(2\)', 'main']
F = ['DELL U2719D \(2\)', 'main']
G = ['DELL U2719D \(2\)', 'main']

# DELL U2719D (1) — secondary (email, docs, reference)
2 = ['DELL U2719D \(1\)', 'main']
4 = ['DELL U2719D \(1\)', 'main']
6 = ['DELL U2719D \(1\)', 'main']
7 = ['DELL U2719D \(1\)', 'main']
8 = ['DELL U2719D \(1\)', 'main']
9 = ['DELL U2719D \(1\)', 'main']

# Built-in — utilities, notes, scratchpad (always on laptop screen)
3 = 'built-in'
I = 'built-in'
M = 'built-in'
N = 'built-in'
O = 'built-in'
P = 'built-in'
Q = 'built-in'
R = 'built-in'
S = 'built-in'
T = 'built-in'
U = 'built-in'
V = 'built-in'
W = 'built-in'
X = 'built-in'
Y = 'built-in'
Z = 'built-in'

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[mode.main.binding]
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'workspace 1 --auto-back-and-forth'
    alt-2 = 'workspace 2 --auto-back-and-forth'
    alt-3 = 'workspace 3 --auto-back-and-forth'
    alt-4 = 'workspace 4 --auto-back-and-forth'
    alt-5 = 'workspace 5 --auto-back-and-forth'
    alt-6 = 'workspace 6 --auto-back-and-forth'
    alt-7 = 'workspace 7 --auto-back-and-forth'
    alt-8 = 'workspace 8 --auto-back-and-forth'
    alt-9 = 'workspace 9 --auto-back-and-forth'
    alt-a = 'workspace A --auto-back-and-forth'
    alt-b = 'workspace B --auto-back-and-forth'
    alt-c = 'workspace C --auto-back-and-forth'
    alt-d = 'workspace D --auto-back-and-forth'
    alt-e = 'workspace E --auto-back-and-forth'
    alt-f = 'workspace F --auto-back-and-forth'
    alt-g = 'workspace G --auto-back-and-forth'
    alt-i = 'workspace I --auto-back-and-forth'
    alt-m = 'workspace M --auto-back-and-forth'
    alt-n = 'workspace N --auto-back-and-forth'
    alt-o = 'workspace O --auto-back-and-forth'
    alt-p = 'workspace P --auto-back-and-forth'
    alt-q = 'workspace Q --auto-back-and-forth'
    alt-r = 'workspace R --auto-back-and-forth'
    alt-s = 'workspace S --auto-back-and-forth'
    alt-t = 'workspace T --auto-back-and-forth'
    alt-u = 'workspace U --auto-back-and-forth'
    alt-v = 'workspace V --auto-back-and-forth'
    alt-w = 'workspace W --auto-back-and-forth'
    alt-x = 'workspace X --auto-back-and-forth'
    alt-y = 'workspace Y --auto-back-and-forth'
    alt-z = 'workspace Z --auto-back-and-forth'

    alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
    alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
    alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
    alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
    alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
    alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
    alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
    alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
    alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']
    alt-shift-0 = ['move-node-to-workspace 0', 'workspace 0']
    alt-shift-a = ['move-node-to-workspace A', 'workspace A']
    alt-shift-b = ['move-node-to-workspace B', 'workspace B']
    alt-shift-c = ['move-node-to-workspace C', 'workspace C']
    alt-shift-d = ['move-node-to-workspace D', 'workspace D']
    alt-shift-e = ['move-node-to-workspace E', 'workspace E']
    alt-shift-f = ['move-node-to-workspace F', 'workspace F']
    alt-shift-g = ['move-node-to-workspace G', 'workspace G']
    alt-shift-i = ['move-node-to-workspace I', 'workspace I']
    alt-shift-m = ['move-node-to-workspace M', 'workspace M']
    alt-shift-n = ['move-node-to-workspace N', 'workspace N']
    alt-shift-o = ['move-node-to-workspace O', 'workspace O']
    alt-shift-p = ['move-node-to-workspace P', 'workspace P']
    alt-shift-q = ['move-node-to-workspace Q', 'workspace Q']
    alt-shift-r = ['move-node-to-workspace R', 'workspace R']
    alt-shift-s = ['move-node-to-workspace S', 'workspace S']
    alt-shift-t = ['move-node-to-workspace T', 'workspace T']
    alt-shift-u = ['move-node-to-workspace U', 'workspace U']
    alt-shift-v = ['move-node-to-workspace V', 'workspace V']
    alt-shift-w = ['move-node-to-workspace W', 'workspace W']
    alt-shift-x = ['move-node-to-workspace X', 'workspace X']
    alt-shift-y = ['move-node-to-workspace Y', 'workspace Y']
    alt-shift-z = ['move-node-to-workspace Z', 'workspace Z']

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    cmd-shift-c = 'reload-config'

    # Scratchpad
    cmd-shift-alt-backtick = 'workspace S'
    cmd-backtick = 'exec-and-forget bash /Users/mike.porter/.config/aerospace/aerospace-scratchpad/scratchpad.sh show'
    cmd-shift-backtick = 'exec-and-forget bash /Users/mike.porter/.config/aerospace/aerospace-scratchpad/scratchpad.sh send'

    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'io.zsa.keymapp'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'com.vivaldi.Vivaldi'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.electron.logseq'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.logi.cp-dev-mgr'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'io.zsa.keymapp'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'net.waterfox.waterfox'
if.workspace = '1'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'net.waterfox.waterfox'
if.workspace = '2'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'net.waterfox.waterfox'
if.workspace = '3'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'net.waterfox.waterfox'
if.workspace = '8'
run = 'move-node-to-workspace 4'
